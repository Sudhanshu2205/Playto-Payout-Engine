version: '3.9'

services:

  # PostgreSQL database
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: payout_engine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Redis — Celery broker
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  # Django web server
  web:
    build: ./backend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    working_dir: /app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis

  # Celery worker — processes payouts
  worker:
    build: ./backend
    restart: unless-stopped
    command: celery -A payout_engine worker --loglevel=info
    volumes:
      - ./backend:/app
    working_dir: /app
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis
      - web

  # Celery beat — runs periodic tasks (retry_stuck_payouts every 10s)
  beat:
    build: ./backend
    restart: unless-stopped
    command: celery -A payout_engine beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    working_dir: /app
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis
      - web

  # React frontend
  frontend:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - web

volumes:
  postgres_data:
